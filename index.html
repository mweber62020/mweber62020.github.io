<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Mobile app stuff -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <title>Weather App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@4.5.2/dist/pulse/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Favicon -->
    <link rel="icon" href="images/favicon.png">
    <link rel="apple-touch-icon" href="images/favicon.png">
</head>

<body class="bg-dark">
    <div class="col-12 d-flex justify-content-center align-items-center min-vh-100">
        <div class="card col-11 col-md-6 col-lg-6" id="weatherCard" style="font-size: x-large;">  
            <div class="row g-0 align-items-center">
                <!-- Left side -->
                <div class="col-md-6 text-center border-end p-5">
                    <!-- Location and date-->
                    <h1 id="locationName">Cookeville, TN</h1>
                    <h2 id="date">Sunday, Mar 1</h2>
                    <hr class="opacity-100">
                    <!-- Current conditions -->
                    <h3>Current Conditions</h3>
                    <p class="mt-3 mb-1" id="condition">Cloudy</p>
                    <i id="weatherIcon" class="bi bi-cloud fs-1"></i>
                </div>
                <!-- Right side -->
                <div class="col-md-6 p-3">
                    <div class="row text-center">
                        <!-- Current temp-->
                        <div class="col-6">
                            <i id="tempIcon" class="bi bi-thermometer-half fs-1"></i>
                            <span id="temp" class="fs-2">--°F</span>
                        </div>
                        <!-- Current humidity -->
                        <div class="col-6">
                            <i class="bi bi-droplet fs-1 text-info"></i>
                            <span id="humidity" class="fs-2">--%</span>
                        </div>
                    </div>
                    <div class="row mt-3 text-center">
                        <!-- Precipitation probability -->
                        <div class="col-12 mt-5">
                            <i class="bi bi-cloud-rain fs-1"></i>
                            <span id="precipValue" class="fs-2">--%</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Footer (I learned how do links from working on capstone project) -->
            <div class="text-center mt-3 small">
                Weather data from:
                <a href="https://open-meteo.com/" target="_blank" rel="noopener noreferrer">Open-Meteo</a>
            </div>
        </div>
    </div>

    <script>
        fetch('https://api.open-meteo.com/v1/forecast?latitude=36.1628&longitude=-85.5016&current=temperature_2m,relative_humidity_2m,weather_code,precipitation_probability&timezone=America%2FChicago&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch')
        // Make sure the response is good before parsing it as JSON
        .then(response => {
            if (!response.ok) {
                throw new Error('Bad HTTPS Response');
            }
            return response.json();
        })
        .then(data => {
            // Update UI with weather data
            document.getElementById('temp').textContent = `${data.current.temperature_2m}°F`;
            // Update temp icon based on temperature (to have some kind of a unique feature)
            const temp = data.current.temperature_2m;
            const tempIcon = document.getElementById('tempIcon');
            if (temp <= 32) {
                tempIcon.className = 'bi bi-thermometer-snow fs-1 text-info';
            } else if (temp <= 70) {
                tempIcon.className = 'bi bi-thermometer-half fs-1';
            } else {
                tempIcon.className = 'bi bi-thermometer-sun fs-1 text-danger';
            }

            document.getElementById('humidity').textContent = `${data.current.relative_humidity_2m}%`;
            document.getElementById('precipValue').textContent = `${data.current.precipitation_probability}%`;
            // Update UI with correct date from api call
            const date = new Date(data.current.time);
            const options = { weekday: 'long', month: 'short', day: 'numeric' };
            document.getElementById('date').textContent = date.toLocaleDateString(undefined, options);

            // Map weather codes to conditions and icons
            const weatherCode = data.current.weather_code;
            let conditionText = '';
            let icon = '';

            // Codes found at the bottom of the documentation
            switch (weatherCode) {
                case 0:
                    conditionText = 'Clear';
                    icon = 'bi-sun';
                    break;
                case 1:
                case 2:
                case 3:
                    conditionText = 'Partly Cloudy';
                    icon = 'bi-cloud-sun';
                    break;
                case 45:
                case 48:
                    conditionText = 'Fog';
                    icon = 'bi-cloud-fog';
                    break;
                case 51:
                case 53:
                case 55:
                    conditionText = 'Light Rain';
                    icon = 'bi-cloud-drizzle';
                    break;
                case 56:
                case 57:
                case 66:
                case 67:
                    conditionText = 'Freezing Rain';
                    icon = 'bi-cloud-sleet';
                    break;
                case 61:
                case 63:
                case 65:
                    conditionText = 'Rain';
                    icon = 'bi-cloud-rain';
                    break;
                case 71:
                case 73:
                case 75:
                case 77:
                    conditionText = 'Snow';
                    icon = 'bi-cloud-snow';
                    break;
                case 80:
                case 81:
                case 82:
                    conditionText = 'Rain Showers';
                    icon = 'bi-cloud-rain';
                    break;
                case 85:
                case 86:
                    conditionText = 'Snow Showers';
                    icon = 'bi-cloud-snow';
                    break;
                case 95:
                    conditionText = 'Thunderstorm';
                    icon = 'bi-cloud-lightning-rain';
                    break;
                default:
                    conditionText = 'Unknown';
                    icon = 'bi-question-circle';
            }
            // Update the UI with the condition and icon
            document.getElementById('condition').textContent = conditionText;
            document.getElementById('weatherIcon').className = `bi ${icon} fs-1`;
        })
        // Incase of an error, update UI
        .catch(error => {
            console.error('Error fetching weather data:', error);
            document.getElementById('condition').textContent = 'Unable to load weather data. Please try again later.';
        });
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
<!-- Generative AI Usage: I used AI to create my icon as well as troubleshoot things like date formatting and how to position things like I wanted them to be displayed.-->
