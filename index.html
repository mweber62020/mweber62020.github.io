<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Mobile app stuff -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-status-bar-style" content="black">

    <title>Weather App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@4.5.2/dist/pulse/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Favicon -->
    <link rel="icon" href="images/favicon.png">

    <!-- Manifest (create later?) 
    <link rel="manifest" href="manifest.webmanifest"> -->
</head>

<body class="bg-dark">
    <div class="col-12 d-flex justify-content-center align-items-center min-vh-100">
        <div class="card col-11 col-md-6 col-lg-6" id="weatherCard" style="font-size: x-large;">  
            <div class="row g-0 align-items-center">
                <!-- Left side -->
                <div class="col-md-6 text-center border-end p-5">
                    <h1 id="locationName">Cookeville, TN</h1>
                    <h2 id="date">Sunday, Mar 1</h2>
                    <h3 id="time">12:00 PM</h3>
                    <hr>
                    <h3>Current Conditions</h3>
                    <p class="mt-3 mb-1" id="condition">Cloudy</p>
                    <i id="weatherIcon" class="bi bi-cloud fs-1"></i>
                </div>
                <!-- Right side -->
                <div class="col-md-6 p-3">
                    <div class="row text-center">
                        <div class="col-6">
                            <i class="bi bi-thermometer-half fs-1"></i>
                            <span id="temp" class="fs-2">--°F</span>
                        </div>
                        <div class="col-6">
                            <i class="bi bi-droplet fs-1"></i>
                            <span id="humidity" class="fs-2">--%</span>
                        </div>
                    </div>
                    <div class="row mt-3 text-center">
                        <div class="col-12 mt-5">
                            <i class="bi bi-cloud-rain fs-1"></i>
                            <span id="precipValue" class="fs-2">--%</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Footer (I learned how do links from working on capstone project) -->
            <div class="text-center mt-3 small">
                Weather data from:
                <a href="https://open-meteo.com/" target="_blank">Open-Meteo</a>
            </div>
        </div>
    </div>

    <script>
        // JavaScript code in here
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
